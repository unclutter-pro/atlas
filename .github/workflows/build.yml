name: build

# atlas images are released on version tags only.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write # keyless cosign (Sigstore OIDC)

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: atlas
            context: .
          - image: atlas-stt
            context: stt
    env:
      IMAGE: ghcr.io/unclutter-pro/${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        run: cosign sign --yes "${IMAGE}@${{ steps.build.outputs.digest }}"
