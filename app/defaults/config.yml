# Agent Configuration
# Editable by Claude and via the Web-UI

agent:
  name: "Atlas" # Display name for the agent (used in UI, logs, prompts). Override with ATLAS_AGENT_NAME env var.
  email: "" # Agent email address (optional, for integrations)

models:
  trigger: opus # Trigger sessions (PM/team lead) — needs strong reasoning
  cron: sonnet # Cron/scheduled trigger sessions
  subagent_review: sonnet # SubagentStop quality gate (prompt hook)
  hooks: haiku # Default model for other prompt/agent hooks

memory:
  qmd_search_mode: query # search (BM25) | vsearch (vector) | query (hybrid)
  qmd_max_results: 6
  load_memory_md: true
  load_journal_days: 7

# Signal integration (requires signal-cli)
# Install: apt-get install -y signal-cli  (in user-extensions.sh)
# Register: signal-cli -a +YOUR_NUMBER register && signal-cli -a +YOUR_NUMBER verify CODE
signal:
  number: "" # Your Signal phone number (e.g. "+491701234567")
  history_turns: 20
  whitelist: [] # Empty = accept all, or list of allowed numbers

# Email integration (IMAP + SMTP)
email:
  imap_host: "" # e.g. "imap.gmail.com"
  imap_port: 993
  smtp_host: "" # e.g. "smtp.gmail.com"
  smtp_port: 587
  username: "" # e.g. "atlas@example.com"
  password_file: "/home/agent/secrets/email-password"
  folder: "INBOX"
  whitelist: [] # Empty = accept all, or list of senders/domains/wildcards (e.g. "*@*.example.com")
  mark_read: true # Mark fetched emails as read on server

daily_cleanup:
  enabled: true
  retention_days: 30 # How long to keep completed tasks, messages, etc.
  metrics_retention_days: 90 # How long to keep session metrics

team:
  # No limit - Claude has full control

web_ui:
  port: 8080
  bind: "127.0.0.1"

failure_handling:
  notification_command: "" # Shell command run once after threshold (e.g. "signal send '+1...' 'API unavailable'")
  backoff_initial_seconds: 30
  backoff_max_seconds: 900 # Cap at 15 minutes
  notification_threshold_minutes: 30

# Speech-to-Text (STT) service
# Used for transcribing voice messages from Signal/WhatsApp.
# Default sidecar: Parakeet (docker-compose.yml). Override for shared/external STT.
stt:
  enabled: true
  url: "http://stt:5092/v1/audio/transcriptions" # Override with STT_URL env var

webhook:
  relay_url: "https://webhooks.unclutter.pro"  # Base URL for webhook relay (smee.io compatible)

# Usage reporting — send session metrics to external endpoints after each session.
# Used by hosting platforms for billing based on work hours.
usage_reporting:
  enabled: false
  webhook_url: ""          # POST endpoint for session metrics (e.g. "https://app.example.org/api/usage")
  webhook_secret: ""       # Shared secret sent as X-Webhook-Secret header
  include_tokens: false    # Include token counts in payload (default: only duration/timing)

# Workspace paths — override to customize directory layout
workspace:
  projects_dir: "" # Custom projects directory path (default: $HOME/projects). Override with ATLAS_PROJECTS_DIR env var.
